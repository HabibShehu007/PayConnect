name: Keep Supabase Alive

on:
  schedule:
    # Runs at 00:00 every day
    - cron: '0 0 * * *'
  workflow_dispatch: 

jobs:
  ping_supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Ping All Tables
        run: |
          echo "Pinging user_profile..."
          curl -f -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/user_profile?select=id&limit=1" \
          -H "apikey: ${{ secrets.SUPABASE_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY }}"

          echo "Pinging transaction..."
          curl -f -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/transactions?select=id&limit=1" \
          -H "apikey: ${{ secrets.SUPABASE_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY }}"

          echo "Pinging activities..."
          curl -f -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/activities?select=id&limit=1" \
          -H "apikey: ${{ secrets.SUPABASE_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY }}"
